- quote: "Google selling Android as both open source and open to running any software you like in order to quickly gain market share, only to break those promises after driving competing platforms out of the market is nothing more than fraud."
  author: "GeekyBear"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45507173"
- quote: "If I go down this path, I will stop all development on Android. I implore all other developers to resist this. This will completely lock down the platform forever, there will be no going back."
  author: "BatteryMountain"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45409794"
- quote: "We need to start treating phones differently. We're entering a world where we can't choose what we run on them. Their primary purpose is to gather data on us and serve us advertising, they're engineered for addiction, yet engaging in the world is immensely difficult without one."
  author: "specproc"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45409794"
- quote: "It took them 17 years to finally pull the cage all the way shut."
  author: "Apocryphon"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45507173"
- quote: "The fundamental problem is that we are relying on the good graces of Google to keep Android open, despite the fact that it often runs contrary to their goals as a $4T for-profit behemoth. The 'don't be evil' days are very far behind us."
  author: "paxys"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47091419"
- quote: "This isn't just a competition between app stores; it's a struggle for choice and dignity. Your phone shouldn't be a cage carefully constructed by others, but an extension of your own will."
  author: "renshijian"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45409794"
- quote: "I still remember how in the early days of Android vs iOS discussions, the main point was 'but it's OPEN!' The word 'open' was used as a comma by Google people. It was The Thing. The Difference. Good vs Evil and all that."
  author: "jwr"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45742488"
- quote: "My Pixel 6 just broke, and after 15 years of using Android, I've finally been convinced to move to iOS. If I must live in a walled garden, I suppose I'll choose the one with nicer flowers."
  author: "yonato"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45409794"
- quote: "Making it harder makes it harder to treat ourselves. Software like AndroidAPS is unique. It's hard to find or very expensive and inferior in the proprietary market."
  author: "pimeys"
  author_note: "diabetic user on life-critical medical software"
  source: "Lobsters"
  url: "https://lobste.rs/s/uikg3e/open_letter_google_regarding_mandatory"
- quote: "If your country is ever in the crosshairs of 'American interests' and bears the brunt of its sanctions, it is possible that you cannot install apps from your fellow citizens. Your own local government, bank, and store apps."
  author: "devsda"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45409794"
- quote: "Requiring a government ID to distribute software. Holy shit. If you are a kid and want to create a game for your friends, you better get that birth certificate ready!"
  author: "llitz"
  source: "Reddit"
  url: "https://www.reddit.com/r/Android/"
- quote: "Software gatekeeping is a threat to human rights. Just recently an app to track ICE was banned from the iOS app store even though this should clearly be protected first amendment speech."
  author: "gthing"
  source: "Reddit"
  url: "https://www.reddit.com/r/Android/"
- quote: "Years ago, I wondered how Google would try to get away with locking down Android and shutting the cage door after capturing such a large dependent user base. Now I see how they are trying to get away with it."
  author: "chaznabin"
  source: "Reddit"
  url: "https://www.reddit.com/r/degoogle/"
- quote: "I hate this so much. More and more I get the feeling I have no control over the devices I own. My fear is that Windows will eventually follow. For security reasons of course. It's the path we're on now."
  author: "cheesyvoetjes"
  source: "Reddit"
  url: "https://www.reddit.com/r/FREEMEDIAHECKYEAH/"
- quote: "The war on General Purpose Computing is the death of innovation and a direct attack on digital freedom."
  author: "layfellow"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45742488"
- quote: "Anyone else thinking this looks like a precursor to banning Signal and similar? 1) Put Google in control of what you can install. 2) Get Google to block it."
  author: "harry8"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45409794"
- quote: "Antitrust action is badly needed. It is ridiculous that I need permission from my device manufacturer to install software on hardware I own."
  author: "jim201"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45569371"
- quote: "Twice I have had to deal with Google silently disabling my drone app to the point I had to buy an older phone to perform work. When I purchase a device that works with another device, under no circumstances should I be at the mercy of any updates they make."
  author: "cbrophoto"
  author_note: "drone professional"
  source: "Reddit"
  url: "https://www.reddit.com/r/fossdroid/"
- quote: "Google's own Play Store had over 600 million malware downloads. They keep talking about 'security' but their own store is crawling with fake apps and straight up malware while actual useful stuff gets buried or rejected."
  author: "Historical-Employ129"
  author_note: "324 upvotes"
  source: "Reddit"
  url: "https://www.reddit.com/r/degoogle/"
- quote: "Computing is infrastructure. Personal computers are a means of expressing agency. This is like banning people from moving furniture around their house without approval from mortgage lenders."
  author: "wervenyt"
  source: "Tildes"
  url: "https://tildes.net/~tech/1ptz#comment-ga7w"
- quote: "Any time someone puts a lock on something that belongs to you, and won't give you a key, they're not doing it for your benefit."
  author: "vord (quoting Cory Doctorow)"
  source: "Tildes"
  url: "https://tildes.net/~tech/1ptz#comment-g9mp"
- quote: "Play store is full of scam apps, F-Droid isn't, but Play Store is considered secure. It's all theatre."
  author: "gcupc"
  source: "Lobsters"
  url: "https://lobste.rs/c/tyaob5"
- quote: "It's not cyclic. It's a ratchet and it gets tighter and tighter."
  author: "BenjaminRi"
  source: "Lobsters"
  url: "https://lobste.rs/c/7qayrh"
- quote: "They have stolen a free product and are now actively locking out the people who built it."
  author: "TheTearMiser"
  source: "Lemmy"
  url: "https://lemmy.world/post/44884898"
- quote: "Signal, VPNs -- they'll have a list of everyone opting out of government-mandated backdoors."
  author: "Max-P"
  source: "Lemmy"
  url: "https://lemmy.world/comment/19748620"
- quote: "'Sideload' is like 'jaywalking'; seeks to stigmatize humans being human."
  author: "tejtm"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47581761"
- quote: "Google wants the authority of a gatekeeper without the overhead of human accountability."
  author: "afferi300rina"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47584305"
- quote: "You are essentially a child to them. The difference is society has decided not to step in to protect you from your abusive parents."
  author: "globular-toast"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47464853"
- quote: "The open Android I knew and loved is long gone."
  author: "girvo"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47464595"
- quote: "I buy a device with my own money, which I supposedly then own, but then I need to ask some corporation permission to use it."
  author: "askonomm"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47464771"
- quote: "Google seems to actively hate people who develop for their platforms."
  author: "hbn"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47589779"
- quote: "After 15 years of professional development on Android I too am now thinking about switching my focus to something different. And it sucks."
  author: "MrDresden"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45471361"
- quote: "They're boiling the frog -- slowly removing features until all choice is gone."
  author: "hn92726819"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45481701"
- quote: "You have no right telling me what I can and cannot run on my own devices."
  author: "MrZander"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45471149"
- quote: "Google's plan to require developer verification would give Google and governments the ability to ban any app."
  author: "Zak"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=45030968"
- quote: "Once deployed, there's a near 100% chance of such a mechanism being used for evil."
  author: "Zak"
  source: "Lemmy"
  url: "https://lemmy.world/comment/19050889"
- quote: "This is a war on users that want to keep control of their phones and when it's done, you will not be able to escape the enshittification."
  author: "ikidd"
  source: "Lemmy"
  url: "https://lemmy.world/comment/19757455"
- quote: "Give me liberty or give me Symbian."
  author: "masterofn001"
  source: "Lemmy"
  url: "https://lemmy.world/comment/19053159"
- quote: "Google has no right to be my parent. As long as I can't reject paternalism, I don't believe for a second this is done with the well-being of scam victims as the main priority."
  author: "gspr"
  source: "Lobsters"
  url: "https://lobste.rs/c/lywddi"
- quote: "Some time in the future, we will look back to this era and ask ourselves what went wrong."
  author: "BenjaminRi"
  source: "Lobsters"
  url: "https://lobste.rs/c/k5ed7g"
- quote: "Modern life practically forces you to put all your eggs into a phone controlled by one of two profit-seeking companies."
  author: "koala"
  source: "Lobsters"
  url: "https://lobste.rs/c/myrxph"
- quote: "For 'security' -- always security with these assholes. They're just building the walls of the walled garden higher."
  author: "lynxy"
  source: "Tildes"
  url: "https://tildes.net/~tech/1ptz#comment-g9ko"
- quote: "If the likes of Google, Microsoft, Apple, Amazon, and others have their way, you will not own your computer; those companies will effectively own your computers."
  author: "RUs1729"
  source: "Slashdot"
  url: "https://tech.slashdot.org/comments.pl?sid=23834026&cid=65762948"
- quote: "Google now has a flag on my phone they can control remotely to keep me from accessing the apps I want."
  author: "vala"
  source: "Lemmy"
  url: "https://lemmy.world/comment/22791537"
- quote: "Android was never actually open and now they are abandoning even the thin pretense."
  author: "Tiraon"
  source: "Tildes"
  url: "https://tildes.net/~tech/1qii#comment-gisv"
- quote: "I teach digital literacy and 99% of unsavory software I encounter on people's phones come from the Play Store or App Store. I will believe they're serious about protecting users when I see them do something about the crap ton of borderline scam apps infesting their stores."
  author: "1995ToyotaCorolla"
  source: "Lemmy"
  url: "https://lemmy.world/post/44485196"
- quote: "Whatever Google is doing kind of scares me. We have a big DIY community of diabetics in Germany running tools like AndroidAPS that cannot ever be distributed through official channels."
  author: "pimeys"
  author_note: "Type 1 diabetic, DIY medical software"
  source: "Lobsters"
  url: "https://lobste.rs/s/uikg3e/open_letter_google_regarding_mandatory"
- quote: "I want to deploy apps on my device. They are my apps, it's my device, and I should not be required to ask for permission to do so."
  author: "fsniper"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47449384"
- quote: "We are talking about something categorically worse than vendor lock-in: Collective vendor lock-in."
  author: "anordal"
  source: "Lobsters"
  url: "https://lobste.rs/s/ckm3vb/what_we_talk_about_when_we_talk_about"
- quote: "If Android's sandbox and permission systems actually worked, then the mere act of installing an app from an arbitrary source would be as harmless as visiting an arbitrary website."
  author: "mwcampbell"
  source: "Lobsters"
  url: "https://lobste.rs/s/g1ktjl/android_developer_verification"
- quote: "There's an entire genre of scamming where the scammers spend months building rapport with their victims before cashing out. One day is nothing."
  author: "free_bip"
  author_note: "on the 24-hour wait defeating scammers"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47444831"
- quote: "Brazil government app refuses to operate with developer mode on."
  author: "flykespice"
  author_note: "developer in Brazil"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47446268"
- quote: "All the banking and payment apps in India refuse to open if you have developer mode on."
  author: "nibbleyou"
  author_note: "developer in India"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47450009"
- quote: "Android is for everyone, provided they submit to Google exclusively."
  author: "gumby271"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47581715"
- quote: "Don't beg. Don't get in a position that freedoms depend on the whims of a corporation or willingness of a government to regulate them. Build."
  author: "jzb"
  source: "Lobsters"
  url: "https://lobste.rs/s/uikg3e/open_letter_google_regarding_mandatory"
- quote: "Can't come at a worse time. People are just learning to make things through vibe coding, and they're gonna want to put their own apps on their phones. And now Google says no."
  author: "Serinus"
  source: "Lemmy"
  url: "https://lemmy.world/post/44130515"
- quote: "The phrase 'sideload' is psychological propaganda we are all best off rejecting."
  author: "WaffleMonster"
  source: "Slashdot"
  url: "https://developers.slashdot.org/story/26/03/19/1832217/google-details-new-24-hour-process-to-sideload-unverified-android-apps"
- quote: "It is a disgrace how Google has managed this situation. The promised 'advanced flow' hasn't appeared in any Android 16 or 17 betas. Google is quietly proceeding with the original lockdown."
  author: "fermigier"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47092304"
- quote: "Social engineering is destroyed with education, not with restriction and control. Trading freedom for safety eliminates both."
  author: "survirtual"
  source: "Hacker News"
  url: "https://news.ycombinator.com/item?id=47453757"
